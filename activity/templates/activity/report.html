{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-primary"><i class="bi bi-graph-up"></i> Team Activity Reports</h2>
    
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5 class="card-title">Total Activities</h5>
                    <h3>{{ total_activities }}</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <h5 class="card-title">In-Progress</h5>
                    <h3>{{ in_progress }}</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-danger">
                <div class="card-body">
                    <h5 class="card-title">Pending</h5>
                    <h3>{{ pending }}</h3>
                </div>
            </div>
        </div>
    </div>

    <canvas id="activityChart" class="mt-4"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    var ctx = document.getElementById('activityChart').getContext('2d');
    var activityChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Completed', 'In Progress', 'Pending'],
            datasets: [{
                data: [{{ completed }}, {{ in_progress }}, {{ pending }}],
                backgroundColor: ['#28a745', '#ffc107', '#dc3545']
            }]
        }
    });
</script>
{% endblock %}
